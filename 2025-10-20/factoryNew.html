<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory new</title>
</head>
<body>
    <script>
        class Car
        {
            constructor()
            {
                this.type = "Car";
            }
        }
        class Bike
        {
            constructor()
            {
                this.type = "bike";
            }
        }
        class VehicleFactory
        {
            createVehicle(type)
            {
                switch(type)
                {
                    case "Car": return new Car();
                    case "Bike": return new Bike();
                    default: console.error(`Cos ty to chcioł wyprodukować? ${type}? Chyba sie przesłyszałem co nie?`); break;
                }
            }
        }

        const factory = new VehicleFactory();
        const car = factory.createVehicle("Car");
        const bike = factory.createVehicle("Bike");
        const klocki = factory.createVehicle("Klocki LEGO");

        console.log(car.type);
        console.log(bike.type);
    </script>
</body>
</html>
